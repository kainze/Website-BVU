<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:image" content="https://www.bv-unterneukirchen.de/android-chrome-512x512.png" />
  <meta property="og:title" content="Kalender BVU" />
  <meta property="og:description" content="Kalender für die Mitglieder des Burschenverein Unterneukirchen" />

  <!-- <link href="node_modules/bootstrap/dist/css/bootstrap.min.css"rel="stylesheet"/> -->
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../node_modules/material-icons/css/material-icons.css" />
  <link rel="stylesheet" href="../dest/css/custom_bootstrap.css?=v1.1">

  <title>BVU Kalender</title>

  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="icon" type="image/png" href="../favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="../android-chrome-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="../android-chrome-192x192.png">

</head>

<body>

  <!-- Calendar -->
  <section id="calendar">
    <div class="container bg-primary text-light-grey containersection" id="calendarDiv">
      <div class="row">
        <div class="col-lg-12 text-primary text-center">
          <div class="my-3 d-flex justify-content-center">
            <a class="d-inline-block" href="/" target="_blank" aria-label="Burschenverein Unterneukirchen">
              <img src="../img/logo_BVU.png" class="brand-logo mx-auto d-block" alt="Burschenverein Unterneukirchen" style="max-height:100px; height:auto; width:auto;">
            </a>
          </div>
          <div class="row">
            <div class="d-flex justify-content-center" id="CalendarCard">
              <div class="form-check form-switch">
                <br>
                <br>
                <input class="form-check-input" type="checkbox" id="flexSwitchCheckCalendar"
                  onclick="LoadCalendarCard()">
                <label class="form-check-label text-start text-white" for="flexSwitchCheckCalendar">Ich bin damit
                  einverstanden, dass mir Inhalte von Google angezeigt werden. Es können dabei personenbezogene Daten an
                  den Anbieter des Inhalts und Drittdienste übermittelt werden. Mehr dazu in der <a
                    href="#navtodatenschutzerklaerung" data-bs-toggle="modal"
                    data-bs-target="#datenschutzerklaerungModal"
                    class="text-light-grey">Datenschutzerklärung</a></label>
                <br>
                <br>
              </div>
            </div>
            <div class="col-lg-12 text-primary text-center">
              <div class="row">
                <div class="col-lg-12 text-white">
                  <br>
                  <a href="https://www.bv-unterneukirchen.de/" target="_blank" class="btn bg-light-grey text-dark mt-1">
                    <i class="bi bi-globe"></i> Weiter zu unserer Website
                  </a>
                  <br>
                  <br>
                  <a href="#navtokalenderHelp" class="btn bg-light-grey text-dark mt-1" data-bs-toggle="modal"
                    data-bs-target="#kalenderHelpModal"><i class="bi bi-calendar-plus"></i> Zu meinem Kalender
                    hinzufügen</a>

                  <br>
                  <br>
                </div>

              </div>

            </div>
          </div>
        </div>
      </div>
  </section>
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="copyToast" class="toast align-items-center text-dark bg-white border-0" role="alert" aria-live="assertive"
      aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">
          Kalender-Link wurde kopiert!
        </div>
        <button type="button" class="btn-close btn-close-dark me-2 m-auto" data-bs-dismiss="toast"
          aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- import Modals -->
  <div id="modal-container"></div>
  <script>
    const modalFiles = [
      '../modals/datenschutzerklaerung.html',
      '../modals/impressum.html',
      '../modals/satzung.html',
      '../modals/veranstaltungen.html',
      '../modals/kalenderhelp.html'
    ];
    const container = document.getElementById('modal-container');
    modalFiles.forEach(file => {
      fetch(file)
        .then(response => response.text())
        .then(html => container.innerHTML += html);
    });
  </script>

  <!-- <script src="node_modules/jquery/dist/jquery.min.js"></script> -->
  <script src="../node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../dest/js/script.js?v=1.6"></script>

</body>

</html>
