# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master", "feature/**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  build-and-deploy-github-pages:
    environment:
      name: Build and Deploy Github Pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4 #3
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Generate gallery.json
        run: node scripts/generate-gallery-json.mjs
      - name: Archive production artifact
        uses: actions/upload-artifact@v4
        with:
          name: dest
          path: dest
      - name: Setup Pages
        uses: actions/configure-pages@v5 #3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  deploy-prod:
    name: Deploy Prod 🚀
    needs: build-and-deploy-github-pages
    if: github.ref == 'refs/heads/master'
    environment: "prod"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dest
          path: dest
      - name: Generate gallery.json
        run: node scripts/generate-gallery-json.mjs
      - name: Sync files to hosting
        uses: SamKirkland/FTP-Deploy-Action@4.0.0
        with:
          server: web17.alfahosting-server.de
          username: h204810_github_deploy
          password: ${{ secrets.ftp_password }}
